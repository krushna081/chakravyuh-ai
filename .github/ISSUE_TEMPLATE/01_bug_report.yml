name: Bug Report
description: Report a reproducible bug
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Chakravyuh AI are you running?
      placeholder: "0.1.0-alpha"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior
      placeholder: |
        1. Run `...`
        2. Send request `...`
        3. Observe error `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include logs, errors, screenshots)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your runtime environment
      placeholder: |
        - OS: Windows 11 / macOS 14 / Ubuntu 24.04
        - Node: v20.10.0
        - npm: 10.5.0
        - Docker: 25.0 (if applicable)
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant config (providers, agents, MCP) — redact API keys
      render: yaml

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have redacted all API keys and secrets
          required: true
        - label: I am running the latest version
          required: false
