name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is the use case?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see implemented?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, diagrams, references to other projects

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which component does this affect?
      multiple: true
      options:
        - Orchestrator
        - Agent
        - Provider
        - MCP Server
        - Memory
        - CLI
        - API
        - Documentation
        - CI/CD
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have searched existing feature requests for duplicates
          required: true
