# =============================================================================
# Chakravyuh AI — Provider Configuration
# =============================================================================
# Define AI providers, their models, and default parameters.
# Users connect their own API keys via .env or environment variables.
# =============================================================================

providers:
  openai:
    enabled: true
    priority: 1
    models:
      - id: gpt-4o
        context: 128000
        capabilities: [chat, code, vision, reasoning]
        cost:
          input: 2.50
          output: 10.00
      - id: gpt-4o-mini
        context: 128000
        capabilities: [chat, code, vision]
        cost:
          input: 0.15
          output: 0.60
      - id: o1
        context: 200000
        capabilities: [chat, code, reasoning]
        cost:
          input: 15.00
          output: 60.00
      - id: o1-mini
        context: 128000
        capabilities: [chat, code, reasoning]
        cost:
          input: 1.10
          output: 4.40
    defaults:
      temperature: 0.7
      maxTokens: 4096

  anthropic:
    enabled: true
    priority: 2
    models:
      - id: claude-sonnet-4-20250514
        context: 200000
        capabilities: [chat, code, vision, reasoning]
        cost:
          input: 3.00
          output: 15.00
      - id: claude-3-5-sonnet-20241022
        context: 200000
        capabilities: [chat, code, vision]
        cost:
          input: 3.00
          output: 15.00
      - id: claude-3-5-haiku-20241022
        context: 200000
        capabilities: [chat, code]
        cost:
          input: 0.80
          output: 4.00
    defaults:
      temperature: 0.7
      maxTokens: 8192

  google:
    enabled: true
    priority: 3
    models:
      - id: gemini-2.5-pro-exp-03-25
        context: 1048576
        capabilities: [chat, code, vision, reasoning, audio]
        cost:
          input: 1.25
          output: 5.00
      - id: gemini-2.0-flash
        context: 1048576
        capabilities: [chat, code, vision, audio]
        cost:
          input: 0.10
          output: 0.40
    defaults:
      temperature: 0.7
      maxOutputTokens: 8192

  deepseek:
    enabled: true
    priority: 4
    models:
      - id: deepseek-chat
        context: 128000
        capabilities: [chat, code]
        cost:
          input: 0.14
          output: 0.28
      - id: deepseek-coder
        context: 128000
        capabilities: [code]
        cost:
          input: 0.14
          output: 0.28
      - id: deepseek-reasoner
        context: 128000
        capabilities: [chat, reasoning]
        cost:
          input: 0.55
          output: 2.19
    defaults:
      temperature: 0.7
      maxTokens: 8192

  grok:
    enabled: false
    priority: 5
    models:
      - id: grok-2
        context: 131072
        capabilities: [chat, code, vision]
        cost:
          input: 2.00
          output: 10.00
      - id: grok-2-mini
        context: 131072
        capabilities: [chat, code]
        cost:
          input: 0.30
          output: 1.50
    defaults:
      temperature: 0.7
      maxTokens: 4096

  openrouter:
    enabled: false
    priority: 6
    models: []
    defaults:
      temperature: 0.7
      maxTokens: 4096

  ollama:
    enabled: false
    priority: 7
    baseUrl: http://localhost:11434
    models:
      - id: llama3.1:8b
        context: 8192
        capabilities: [chat, code]
        cost:
          input: 0
          output: 0
