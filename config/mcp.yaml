# =============================================================================
# Chakravyuh AI — MCP Server Configuration
# =============================================================================
# Configure MCP servers for agent tool access.
# Each server can be individually enabled, auto-started, and configured.
# =============================================================================

servers:
  filesystem:
    enabled: true
    autoStart: true
    command: npx -y @modelcontextprotocol/server-filesystem
    args:
      - "--allowed"
      - "./workspace"
    env: {}

  github:
    enabled: true
    autoStart: false
    command: npx -y @modelcontextprotocol/server-github
    args: []
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"

  browser:
    enabled: false
    autoStart: false
    command: npx -y @anthropic/server-browser
    args: []
    env:
      HEADLESS: "true"

  web-fetch:
    enabled: true
    autoStart: true
    command: npx -y @anthropic/server-web-fetch
    args: []
    env: {}

  database:
    enabled: false
    autoStart: false
    command: npx -y @anthropic/server-postgres
    args: []
    env:
      DATABASE_URL: "${DATABASE_URL}"

  terminal:
    enabled: false
    autoStart: false
    command: npx -y @chakravyuh/server-terminal
    args:
      - "--allowed-commands"
      - "npm,git,node,tsc"
      - "--cwd"
      - "./workspace"
    env: {}

  gmail:
    enabled: false
    autoStart: false
    command: npx -y @chakravyuh/server-gmail
    args: []
    env:
      GMAIL_CLIENT_ID: "${GMAIL_CLIENT_ID}"
      GMAIL_CLIENT_SECRET: "${GMAIL_CLIENT_SECRET}"
      GMAIL_REFRESH_TOKEN: "${GMAIL_REFRESH_TOKEN}"

  drive:
    enabled: false
    autoStart: false
    command: npx -y @chakravyuh/server-drive
    args: []
    env:
      GOOGLE_DRIVE_CLIENT_ID: "${GOOGLE_DRIVE_CLIENT_ID}"
      GOOGLE_DRIVE_CLIENT_SECRET: "${GOOGLE_DRIVE_CLIENT_SECRET}"

  calendar:
    enabled: false
    autoStart: false
    command: npx -y @chakravyuh/server-calendar
    args: []
    env:
      GOOGLE_CALENDAR_CLIENT_ID: "${GOOGLE_CALENDAR_CLIENT_ID}"
      GOOGLE_CALENDAR_CLIENT_SECRET: "${GOOGLE_CALENDAR_CLIENT_SECRET}"
